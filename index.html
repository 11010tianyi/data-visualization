<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataViz Studio — 26种专业图表可视化</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        :root {
            --dark: #141413;
            --light: #faf9f5;
            --mid-gray: #b0aea5;
            --light-gray: #e8e6dc;
            --orange: #d97757;
            --blue: #6a9bcc;
            --green: #788c5d;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(20,20,19,0.08);
            --shadow-lg: 0 12px 48px rgba(20,20,19,0.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Lora', Georgia, serif;
            background: var(--light);
            color: var(--dark);
            min-height: 100vh;
        }
        h1,h2,h3,h4,h5,h6,.heading {
            font-family: 'Poppins', Arial, sans-serif;
        }

        /* ── Header ── */
        header {
            background: var(--dark);
            color: var(--light);
            padding: 48px 24px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -60%; left: -20%;
            width: 60%; height: 200%;
            background: radial-gradient(ellipse, rgba(217,119,87,0.15), transparent 70%);
            pointer-events: none;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -60%; right: -20%;
            width: 60%; height: 200%;
            background: radial-gradient(ellipse, rgba(106,155,204,0.12), transparent 70%);
            pointer-events: none;
        }
        header h1 {
            font-size: 2.4em;
            font-weight: 700;
            letter-spacing: -0.5px;
            position: relative;
        }
        header h1 span { color: var(--orange); }
        header p {
            font-size: 1.05em;
            color: var(--mid-gray);
            margin-top: 10px;
            position: relative;
        }
        .header-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 28px;
            position: relative;
        }
        .header-stats .stat {
            text-align: center;
        }
        .header-stats .stat-num {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8em;
            font-weight: 700;
            color: var(--orange);
        }
        .header-stats .stat-label {
            font-size: 0.85em;
            color: var(--mid-gray);
            margin-top: 2px;
        }

        /* ── Layout ── */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            margin-top: -32px;
            position: relative;
            z-index: 1;
        }

        /* ── Sidebar ── */
        .sidebar {
            position: sticky;
            top: 16px;
            height: fit-content;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: var(--shadow-lg); }
        .card-title {
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        /* ── Upload ── */
        .upload-zone {
            border: 2px dashed var(--light-gray);
            border-radius: var(--radius);
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: var(--light);
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--orange);
            background: rgba(217,119,87,0.04);
        }
        .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
        .upload-zone h4 {
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            color: var(--dark);
        }
        .upload-zone p { font-size: 0.82em; color: var(--mid-gray); margin-top: 4px; }
        .upload-zone .formats {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
        }
        .upload-zone .formats span {
            font-family: 'Poppins', sans-serif;
            font-size: 0.7em;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--light-gray);
            color: var(--dark);
        }
        #fileInput { display: none; }

        /* ── File Info ── */
        .file-info {
            display: none;
            padding: 14px;
            background: var(--light);
            border-radius: 8px;
            font-size: 0.85em;
            color: var(--dark);
        }
        .file-info.show { display: block; }
        .file-info .name {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: var(--orange);
        }
        .file-info .stats { color: var(--mid-gray); margin-top: 4px; }

        /* ── Templates ── */
        .tpl-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .tpl-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 9px 10px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            background: var(--light);
            cursor: pointer;
            font-size: 0.78em;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            color: var(--dark);
            transition: all 0.2s;
        }
        .tpl-btn:hover {
            border-color: var(--orange);
            background: rgba(217,119,87,0.06);
            color: var(--orange);
        }
        .tpl-btn .t-icon { font-size: 1.1em; }

        /* ── Data Preview ── */
        .preview-wrap {
            max-height: 180px;
            overflow: auto;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            font-size: 0.78em;
        }
        .preview-wrap table { width: 100%; border-collapse: collapse; }
        .preview-wrap th {
            background: var(--dark);
            color: var(--light);
            padding: 7px 10px;
            text-align: left;
            position: sticky;
            top: 0;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9em;
        }
        .preview-wrap td {
            padding: 6px 10px;
            border-bottom: 1px solid var(--light-gray);
        }
        .preview-wrap tr:nth-child(even) { background: var(--light); }

        /* ── Content Area ── */
        .content { display: flex; flex-direction: column; gap: 24px; }

        /* ── Chart Category ── */
        .chart-category {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .cat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--light-gray);
        }
        .cat-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            flex-shrink: 0;
        }
        .cat-header h3 {
            font-size: 1em;
            font-weight: 600;
        }
        .cat-header p {
            font-size: 0.8em;
            color: var(--mid-gray);
        }
        .cat-count {
            margin-left: auto;
            font-family: 'Poppins', sans-serif;
            font-size: 0.75em;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--light);
            color: var(--mid-gray);
        }

        /* ── Chart Grid ── */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            padding: 20px;
        }
        .chart-card {
            border: 2px solid var(--light-gray);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s;
            background: #fff;
        }
        .chart-card:hover {
            border-color: var(--orange);
            box-shadow: 0 6px 24px rgba(217,119,87,0.12);
            transform: translateY(-3px);
        }
        .chart-card.selected {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(217,119,87,0.15);
        }
        .chart-thumb {
            width: 100%;
            height: 150px;
            overflow: hidden;
            background: var(--light);
            position: relative;
        }
        .chart-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .chart-card:hover .chart-thumb img {
            transform: scale(1.03);
        }
        .chart-thumb .thumb-overlay {
            position: absolute;
            inset: 0;
            background: rgba(20,20,19,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .chart-card:hover .thumb-overlay { opacity: 1; }
        .thumb-overlay span {
            font-family: 'Poppins', sans-serif;
            font-size: 0.8em;
            font-weight: 600;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            background: var(--orange);
        }
        .chart-info {
            padding: 12px 14px;
        }
        .chart-info h4 {
            font-size: 0.88em;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .chart-info p {
            font-size: 0.78em;
            color: var(--mid-gray);
            line-height: 1.4;
        }

        /* ── Generate Section ── */
        .gen-section {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            display: none;
        }
        .gen-section.show { display: block; }
        .gen-section h3 {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .gen-section h3 .sel-badge {
            font-size: 0.75em;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(217,119,87,0.1);
            color: var(--orange);
        }
        .opt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .opt-group label {
            display: block;
            font-family: 'Poppins', sans-serif;
            font-size: 0.8em;
            font-weight: 500;
            color: var(--mid-gray);
            margin-bottom: 5px;
        }
        .opt-group input, .opt-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            font-family: 'Lora', serif;
            font-size: 0.9em;
            color: var(--dark);
            background: var(--light);
            transition: border-color 0.2s;
        }
        .opt-group input:focus, .opt-group select:focus {
            outline: none;
            border-color: var(--orange);
        }
        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            padding: 11px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--orange);
            color: #fff;
        }
        .btn-primary:hover { background: #c4683f; transform: translateY(-1px); }
        .btn-outline {
            background: transparent;
            color: var(--dark);
            border: 2px solid var(--light-gray);
        }
        .btn-outline:hover { border-color: var(--dark); }
        .btn-blue {
            background: var(--blue);
            color: #fff;
        }
        .btn-blue:hover { background: #5a8ab5; }
        .btn-green {
            background: var(--green);
            color: #fff;
        }
        .btn-green:hover { background: #667a4e; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* ── Chart Output ── */
        .chart-output {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            display: none;
        }
        .chart-output.show { display: block; }
        .chart-output h3 {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .chart-frame {
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            min-height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light);
            overflow: hidden;
        }
        .chart-frame img {
            max-width: 100%;
            border-radius: var(--radius);
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .dl-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(20,20,19,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal.show { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            max-width: 860px;
            width: 90%;
            max-height: 85vh;
            overflow: auto;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px; right: 16px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--mid-gray);
            line-height: 1;
        }
        .modal-close:hover { color: var(--dark); }
        .modal-box h3 {
            font-size: 1.1em;
            font-weight: 600;
            padding-right: 30px;
        }
        .modal-box img {
            width: 100%;
            border-radius: var(--radius);
            margin-top: 16px;
            box-shadow: var(--shadow);
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 22px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.88em;
            font-weight: 500;
            color: #fff;
            z-index: 2000;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.ok { background: var(--green); }
        .toast.err { background: #c0392b; }

        /* ── Responsive ── */
        @media (max-width: 960px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar { position: static; }
            .chart-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
        }
        @media (max-width: 600px) {
            header h1 { font-size: 1.6em; }
            .header-stats { gap: 20px; }
            .tpl-grid { grid-template-columns: 1fr; }
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>DataViz <span>Studio</span></h1>
    <p>上传数据，选择图表，一键生成专业可视化</p>
    <div class="header-stats">
        <div class="stat"><div class="stat-num">26</div><div class="stat-label">图表类型</div></div>
        <div class="stat"><div class="stat-num">9</div><div class="stat-label">分类</div></div>
        <div class="stat"><div class="stat-num">3</div><div class="stat-label">文件格式</div></div>
    </div>
</header>

<div class="container">
<div class="main-layout">

<!-- ═══ Sidebar ═══ -->
<aside class="sidebar">
    <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--orange)"></span>上传数据</div>
        <div class="upload-zone" id="uploadZone">
            <div class="icon">📂</div>
            <h4>拖拽或点击上传</h4>
            <p>支持以下格式</p>
            <div class="formats"><span>TSV</span><span>CSV</span><span>XLSX</span></div>
            <input type="file" id="fileInput" accept=".tsv,.csv,.xlsx,.xls">
        </div>
        <div class="file-info" id="fileInfo">
            <div class="name" id="fileName"></div>
            <div class="stats" id="fileStats"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--blue)"></span>下载模板</div>
        <div class="tpl-grid" id="tplGrid"></div>
    </div>

    <div class="card" id="previewCard" style="display:none">
        <div class="card-title"><span class="dot" style="background:var(--green)"></span>数据预览</div>
        <div class="preview-wrap" id="previewTable"></div>
    </div>
</aside>

<!-- ═══ Main Content ═══ -->
<main class="content" id="chartCategories"></main>

</div><!-- /main-layout -->
</div><!-- /container -->

<!-- Generate -->
<div class="container">
<div class="gen-section" id="genSection">
    <h3>⚙️ 图表配置 <span class="sel-badge" id="selBadge"></span></h3>
    <div class="opt-grid">
        <div class="opt-group"><label>图表标题</label><input type="text" id="optTitle" placeholder="输入标题"></div>
        <div class="opt-group"><label>主题风格</label>
            <select id="optTheme">
                <option value="default">默认浅色</option>
                <option value="academy">学术风格</option>
                <option value="dark">深色主题</option>
            </select>
        </div>
        <div class="opt-group"><label>宽度 (px)</label><input type="number" id="optW" value="800" min="400" max="2000"></div>
        <div class="opt-group"><label>高度 (px)</label><input type="number" id="optH" value="500" min="300" max="1500"></div>
    </div>
    <div class="btn-row">
        <button class="btn btn-primary" onclick="generateChart()">🎨 生成图表</button>
        <button class="btn btn-outline" onclick="resetSel()">↺ 重新选择</button>
    </div>
</div>
</div>

<!-- Output -->
<div class="container">
<div class="chart-output" id="chartOutput">
    <h3>📊 图表预览</h3>
    <div class="chart-frame" id="chartFrame">
        <div class="spinner" id="spinner"></div>
        <img id="chartImg" style="display:none">
    </div>
    <div class="dl-row">
        <button class="btn btn-primary" onclick="dlPNG()">📥 下载 PNG</button>
        <button class="btn btn-blue" onclick="dlPDF()">📄 下载 PDF</button>
    </div>
</div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <h3 id="modalTitle"></h3>
        <div id="modalBody"></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════

const THUMB_URLS = {
    line: "https://mdn.alipayobjects.com/one_clip/afts/img/92hOS6_61tYAAAAARdAAAAgAoEACAQFr/original",
    area: "https://mdn.alipayobjects.com/one_clip/afts/img/sIkTRLQeFe0AAAAAQ5AAAAgAoEACAQFr/original",
    dual_axes: "https://mdn.alipayobjects.com/one_clip/afts/img/quMSRZ8PKKUAAAAARDAAAAgAoEACAQFr/original",
    bar: "https://mdn.alipayobjects.com/one_clip/afts/img/OryzTbYcfKEAAAAAQ8AAAAgAoEACAQFr/original",
    column: "https://mdn.alipayobjects.com/one_clip/afts/img/8CnQQ58vXjYAAAAAQ0AAAAgAoEACAQFr/original",
    histogram: "https://mdn.alipayobjects.com/one_clip/afts/img/DBhqS7lYwHsAAAAAQgAAAAgAoEACAQFr/original",
    radar: "https://mdn.alipayobjects.com/one_clip/afts/img/oOX-SaUnOnIAAAAARhAAAAgAoEACAQFr/original",
    pie: "https://mdn.alipayobjects.com/one_clip/afts/img/kMpFS7oiKAUAAAAARTAAAAgAoEACAQFr/original",
    treemap: "https://mdn.alipayobjects.com/one_clip/afts/img/AMAcT4IL_voAAAAAQgAAAAgAoEACAQFr/original",
    liquid: "https://mdn.alipayobjects.com/one_clip/afts/img/mDxHRqnu9zcAAAAAQxAAAAgAoEACAQFr/original",
    scatter: "https://mdn.alipayobjects.com/one_clip/afts/img/cCFmSpx_KgIAAAAAQrAAAAgAoEACAQFr/original",
    sankey: "https://mdn.alipayobjects.com/one_clip/afts/img/iXFuSY_tZysAAAAAQlAAAAgAoEACAQFr/original",
    venn: "https://mdn.alipayobjects.com/one_clip/afts/img/vel_QaZyUA0AAAAAQsAAAAgAoEACAQFr/original",
    network_graph: "https://mdn.alipayobjects.com/one_clip/afts/img/_-TwSonSRPsAAAAAQuAAAAgAoEACAQFr/original",
    boxplot: "https://mdn.alipayobjects.com/one_clip/afts/img/us_YRoe59WMAAAAAQmAAAAgAoEACAQFr/original",

    mind_map: { data:{name:'数据分析',children:[{name:'数据采集',children:[{name:'日志'},{name:'埋点'},{name:'API'}]},{name:'数据处理',children:[{name:'清洗'},{name:'转换'},{name:'聚合'}]},{name:'数据可视化',children:[{name:'图表'},{name:'仪表盘'}]},{name:'数据建模',children:[{name:'回归'},{name:'分类'},{name:'聚类'}]}]}, title:'知识体系' },
    word_cloud: { data:[{text:'人工智能',value:100},{text:'大数据',value:85},{text:'云计算',value:75},{text:'区块链',value:60},{text:'物联网',value:55},{text:'机器学习',value:90},{text:'深度学习',value:80},{text:'自然语言',value:65},{text:'计算机视觉',value:70},{text:'数据挖掘',value:50},{text:'边缘计算',value:45},{text:'5G',value:40}], title:'技术热词' },
    spreadsheet: { data:[{name:'产品A',sales:120,profit:30,region:'华东'},{name:'产品B',sales:150,profit:45,region:'华南'},{name:'产品C',sales:180,profit:55,region:'华北'},{name:'产品D',sales:200,profit:65,region:'西南'}], title:'销售报表' },
    district_map: { title:'浙江省', data:{name:'浙江省',subdistricts:[{name:'杭州',dataValue:1200},{name:'宁波',dataValue:800},{name:'温州',dataValue:650},{name:'嘉兴',dataValue:500}]}, isMap:true },
    pin_map: { title:'门店分布', data:['北京天安门','上海外滩','杭州西湖','广州塔','成都天府广场'], isMap:true },
    path_map: { title:'旅行路线', data:[{data:['北京','西安','成都','昆明']}], isMap:true }
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let uploadedData = null;
let selectedChart = null;
let generatedUrl = null;

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(function init() {
    renderCategories();
    renderTemplates();
    initUpload();
})();

function renderCategories() {
    const el = document.getElementById('chartCategories');
    el.innerHTML = CATEGORIES.map(cat => `
        <div class="chart-category">
            <div class="cat-header">
                <div class="cat-icon" style="background:${cat.color}15;color:${cat.color}">${cat.icon}</div>
                <div><h3>${cat.name}</h3><p>${cat.desc}</p></div>
                <span class="cat-count">${cat.charts.length} 种</span>
            </div>
            <div class="chart-grid">
                ${cat.charts.map(c => `
                    <div class="chart-card" data-chart="${c.key}" onclick="selectChart('${c.key}',event)">
                        <div class="chart-thumb">
                            <img src="${THUMB_URLS[c.key]}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
                            <div class="thumb-overlay"><span>选择此图表</span></div>
                        </div>
                        <div class="chart-info">
                            <h4>${c.name}</h4>
                            <p>${c.desc}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function renderTemplates() {
    const el = document.getElementById('tplGrid');
    el.innerHTML = Object.entries(TEMPLATES).map(([k,v]) =>
        `<button class="tpl-btn" onclick="dlTemplate('${k}')"><span class="t-icon">${v.label.split(' ')[0]}</span><span>${v.label.split(' ').slice(1).join(' ')}</span></button>`
    ).join('');
}

// ═══════════════════════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════════════════════
function initUpload() {
    const zone = document.getElementById('uploadZone');
    const input = document.getElementById('fileInput');
    zone.addEventListener('click', () => input.click());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
    input.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });
}

function handleFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['tsv','csv','xlsx','xls'].includes(ext)) return toast('不支持的格式','err');
    const reader = new FileReader();
    if (ext === 'xlsx' || ext === 'xls') {
        reader.onload = e => {
            try {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                uploadedData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                showFileInfo(file, uploadedData);
                toast('上传成功','ok');
            } catch(err) { toast('解析失败: '+err.message,'err'); }
        };
        reader.readAsArrayBuffer(file);
    } else {
        reader.onload = e => {
            try {
                uploadedData = parseCSV(e.target.result, ext==='tsv'?'\t':',');
                showFileInfo(file, uploadedData);
                toast('上传成功','ok');
            } catch(err) { toast('解析失败: '+err.message,'err'); }
        };
        reader.readAsText(file);
    }
}

function parseCSV(text, delim) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(delim).map(h=>h.trim());
    return lines.slice(1).map(line => {
        const vals = line.split(delim);
        const row = {};
        headers.forEach((h,i) => {
            let v = vals[i]?.trim() || '';
            const n = parseFloat(v);
            row[h] = isNaN(n) ? v : n;
        });
        return row;
    });
}

function showFileInfo(file, data) {
    document.getElementById('fileInfo').classList.add('show');
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileStats').textContent = `${data.length} 行 × ${Object.keys(data[0]||{}).length} 列`;
    const card = document.getElementById('previewCard');
    card.style.display = 'block';
    const headers = Object.keys(data[0]||{});
    const rows = data.slice(0,8);
    let html = '<table><thead><tr>' + headers.map(h=>`<th>${h}</th>`).join('') + '</tr></thead><tbody>';
    rows.forEach(r => { html += '<tr>' + headers.map(h=>`<td>${r[h]??''}</td>`).join('') + '</tr>'; });
    html += '</tbody></table>';
    document.getElementById('previewTable').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// TEMPLATES
// ═══════════════════════════════════════════════════════════
function dlTemplate(key) {
    const tpl = TEMPLATES[key];
    if (!tpl) return;
    const blob = new Blob([tpl.tsv], {type:'text/tab-separated-values'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${key}_template.tsv`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast('模板已下载','ok');
}

// ═══════════════════════════════════════════════════════════
// CHART SELECTION & GENERATION
// ═══════════════════════════════════════════════════════════
function selectChart(key, e) {
    if (!uploadedData) { toast('请先上传数据文件','err'); return; }
    document.querySelectorAll('.chart-card').forEach(c=>c.classList.remove('selected'));
    e.currentTarget.classList.add('selected');
    selectedChart = key;
    const names = {line:'折线图',area:'面积图',dual_axes:'双轴图',bar:'条形图',column:'柱状图',histogram:'直方图',radar:'雷达图',pie:'饼图',treemap:'矩形树图',liquid:'水波图',scatter:'散点图',sankey:'桑基图',venn:'韦恩图',network_graph:'网络图',boxplot:'箱线图',violin:'小提琴图',funnel:'漏斗图',flow_diagram:'流程图',fishbone:'鱼骨图',organization_chart:'组织架构图',mind_map:'思维导图',word_cloud:'词云图',spreadsheet:'表格',district_map:'区域地图',pin_map:'标记地图',path_map:'路径地图'};
    document.getElementById('selBadge').textContent = names[key] || key;
    const sec = document.getElementById('genSection');
    sec.classList.add('show');
    sec.scrollIntoView({behavior:'smooth',block:'center'});
}

function resetSel() {
    document.querySelectorAll('.chart-card').forEach(c=>c.classList.remove('selected'));
    selectedChart = null;
    document.getElementById('genSection').classList.remove('show');
    document.getElementById('chartOutput').classList.remove('show');
}

async function generateChart() {
    if (!uploadedData || !selectedChart) return toast('请上传数据并选择图表','err');
    const title = document.getElementById('optTitle').value || '数据可视化';
    const theme = document.getElementById('optTheme').value;
    const w = parseInt(document.getElementById('optW').value)||800;
    const h = parseInt(document.getElementById('optH').value)||500;

    const out = document.getElementById('chartOutput');
    out.classList.add('show');
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('chartImg').style.display = 'none';
    out.scrollIntoView({behavior:'smooth',block:'center'});

    try {
        const args = buildArgs(selectedChart, uploadedData, {title,theme,width:w,height:h});
        const tool = TOOL_MAP[selectedChart];
        const payload = { type: TYPE_MAP[tool], source: 'chart-visualization-web', ...args };
        const res = await fetch('/api/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const result = await res.json();
        if (result.success && result.resultObj) {
            generatedUrl = result.resultObj;
            const img = document.getElementById('chartImg');
            img.src = generatedUrl;
            img.style.display = 'block';
            document.getElementById('spinner').style.display = 'none';
            toast('图表生成成功','ok');
        } else {
            throw new Error(result.errorMessage || '生成失败');
        }
    } catch(err) {
        document.getElementById('spinner').style.display = 'none';
        toast('生成失败: '+err.message,'err');
    }
}

function buildArgs(key, data, opts) {
    const base = { title:opts.title, theme:opts.theme, width:opts.width, height:opts.height };
    // 特殊图表类型的数据格式转换
    if (key === 'histogram') {
        // histogram 需要 number[]
        const numCol = Object.keys(data[0]).find(k => typeof data[0][k] === 'number');
        return { ...base, data: numCol ? data.map(r=>r[numCol]) : data.map(r=>parseFloat(Object.values(r)[0])) };
    }
    if (key === 'liquid') {
        const numCol = Object.keys(data[0]).find(k => typeof data[0][k] === 'number');
        const val = numCol ? data[0][numCol] : parseFloat(Object.values(data[0])[0]);
        return { ...base, percent: Math.min(1, Math.max(0, val)) };
    }
    if (key === 'dual_axes') {
        const cols = Object.keys(data[0]);
        const cats = data.map(r=>r[cols[0]]);
        const series = cols.slice(1).map((c,i) => ({
            type: i===0 ? 'column' : 'line',
            data: data.map(r=>r[c]),
            axisYTitle: c
        }));
        return { ...base, categories:cats, series };
    }
    if (['network_graph','flow_diagram'].includes(key)) {
        // 尝试从扁平数据构建 nodes/edges
        const nodes = data.filter(r=>r.node_type==='node').map(r=>({name:r.name}));
        const edges = data.filter(r=>r.node_type==='edge').map(r=>{
            const parts = r.name.split('-');
            return {source:parts[0],target:parts[1],name:r.name};
        });
        if (nodes.length && edges.length) return { ...base, data:{nodes,edges} };
        return { ...base, data };
    }
    if (['fishbone','mind_map','organization_chart'].includes(key)) {
        const nodes = data.filter(r=>r.node_type==='node').map(r=>({name:r.name,description:r.description}));
        if (nodes.length > 1) {
            const root = nodes[0];
            root.children = nodes.slice(1);
            return { ...base, data:root };
        }
        return { ...base, data };
    }
    if (key === 'district_map') {
        const subs = data.map(r=>({name:r.name,dataValue:r.dataValue}));
        return { ...base, title:opts.title, data:{name:opts.title,subdistricts:subs} };
    }
    if (key === 'pin_map') {
        return { ...base, title:opts.title, data:data.map(r=>r.poi||r.name||Object.values(r)[0]) };
    }
    if (key === 'path_map') {
        return { ...base, title:opts.title, data:[{data:data.map(r=>r.poi||r.name||Object.values(r)[0])}] };
    }
    if (key === 'treemap') {
        // 如果有 type 字段，按 type 分组
        if (data[0] && data[0].type) {
            const groups = {};
            data.forEach(r => {
                if (!groups[r.type]) groups[r.type] = [];
                groups[r.type].push({name:r.name,value:r.value});
            });
            return { ...base, data:Object.entries(groups).map(([k,children])=>({name:k,value:children.reduce((s,c)=>s+c.value,0),children})) };
        }
    }
    return { ...base, data };
}

// ═══════════════════════════════════════════════════════════
// DOWNLOAD
// ═══════════════════════════════════════════════════════════
async function dlPNG() {
    if (!generatedUrl) return toast('请先生成图表','err');
    try {
        const res = await fetch(generatedUrl);
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `chart_${Date.now()}.png`;
        a.click();
        URL.revokeObjectURL(a.href);
        toast('PNG 已下载','ok');
    } catch(e) { toast('下载失败','err'); }
}

async function dlPDF() {
    if (!generatedUrl) return toast('请先生成图表','err');
    try {
        const {jsPDF} = window.jspdf;
        const pdf = new jsPDF('landscape','mm','a4');
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            const pw = pdf.internal.pageSize.getWidth();
            const ph = pdf.internal.pageSize.getHeight();
            const ratio = Math.min(pw/img.width, ph/img.height)*0.9;
            const fw = img.width*ratio, fh = img.height*ratio;
            pdf.addImage(img,'PNG',(pw-fw)/2,(ph-fh)/2,fw,fh);
            pdf.save(`chart_${Date.now()}.pdf`);
            toast('PDF 已下载','ok');
        };
        img.onerror = () => toast('图片加载失败','err');
        img.src = generatedUrl;
    } catch(e) { toast('PDF 生成失败','err'); }
}

// ═══════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeModal(); });

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    setTimeout(()=>el.classList.remove('show'), 3000);
}
</script>
